<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Meteo CV</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="multimedia/logo.png">
</head>
<body>

  <main class="container">
    <header>
      <h1>Meteo CV</h1>
      <div id="search-wrapper">
        <input type="text" id="buscador-input" placeholder="Cerca el teu poble..." list="municipios">
        <datalist id="municipios"></datalist>
      </div>
    </header>

    <section id="resultado-tiempo-home"></section>

    <div class="column map-column">
      <h2>⚠️ Avisos AEMET</h2>
      <iframe src="https://wirenext.github.io/AlertasAemet/" loading="lazy"></iframe>
    </div>

    <div class="column map-column">
      <h2>🌧️ Radar de Pluja</h2>
      <iframe src="https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=7&overlay=radar&product=radar&lat=39.4&lon=-0.4" loading="lazy"></iframe>
    </div>

    <div class="column map-column">
      <h2>🚨 Emergències 112</h2>
      <iframe src="https://wirenext.github.io/EmergenciasCV/" loading="lazy"></iframe>
    </div>

    <footer>
      <p>© 2025 Meteorologia CV — WireNext</p>
    </footer>
  </main>

<nav>
  <a href="index.html">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Inici</span>
  </a>
  <a href="avisos.html">
    <span class="nav-icon">⚠️</span>
    <span class="nav-label">Avisos</span>
  </a>
  <a href="radar.html">
    <span class="nav-icon">🌧️</span>
    <span class="nav-label">Radar</span>
  </a>
  <a href="transit.html">
    <span class="nav-icon">🚗</span>
    <span class="nav-label">Trànsit</span>
  </a>
  <button id="theme-toggle">
    <span class="nav-icon">🌓</span>
    <span class="nav-label">Mode</span>
  </button>
</nav>

  <script src="js/script.js"></script>
</body>
</html>
